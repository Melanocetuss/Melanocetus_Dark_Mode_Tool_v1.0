<!DOCTYPE html>
<html>

<head>
       
    <meta charset="UTF-8">
        <style>
        body {
            width: 300px;
            background: #0a0a0a;
            color: #d4af37;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            text-align: center;
        }

        .header {
            padding: 20px;
            background: #111;
            border-bottom: 2px solid #d4af37;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            margin-bottom: 10px;
            object-fit: cover;
        }

        h1 {
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 5px 0 0 0;
        }

        .container {
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 14px;
            background: #111;
            color: #d4af37;
            border: 1px solid #d4af37;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .footer {
            font-size: 9px;
            color: #444;
            padding-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="header">
        <img src="icon.png" class="logo">
        <h1>Dark Mode Tool</h1>
    </div>
    <div class="container">
        <button id="btn-dark">Active Dark Mode</button>
        <button id="btn-default">Restore Default</button>
    </div>
    <script src="popup.js"></script>
</body>

</html>
