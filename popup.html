<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            background: #0a0a0a;
            color: #d4af37;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            text-align: center;
        }

        .header {
            padding: 30px;
            background: #111;
            border-bottom: 2px solid #d4af37;
        }

        /* Şık Başlık */
        .title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 6px;
            border: 2px solid #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            object-fit: cover;
            display: block;
            margin: 0 auto;
        }

        .switch-container {
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        /* Switch ve İkonlar */
        .label-text {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
            border: 1px solid #d4af37;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 3px;
            background-color: #d4af37;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #d4af37;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
            background-color: #000;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="title">Dark Mode Tool v1.0</div>
        <img src="icon.png" class="logo">
    </div>
    <div class="switch-container">
        <span class="label-text">☀️ Standart</span>
        <label class="switch">
            <input type="checkbox" id="darkToggle">
            <span class="slider"></span>
        </label>
        <span class="label-text">🌙 Karanlık</span>
    </div>
    <script src="popup.js"></script>
</body>

</html>
